# @package _global_
training:
  task_name: X2WalkFlat
  sim_backend: mujoco
algo:
  num_envs: 8192
  max_iterations: 7000
  obs_groups:
    actor:
      - actor
env:
  control_config:
    action_scale: 0.9
  gait_phase_init_mode: "offset_phase"
  reset_base_qvel_limit: 0.3
  curriculum:
    enabled: true
    initial_scale: 0.5
    min_scale: 0.5
    max_scale: 1.0
    level_down_threshold: 150.0
    level_up_threshold: 750.0
    degree: 0.001
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 0.1
    scale_gyro: 0.1
    scale_gravity: 0.1
    scale_linvel: 0.0
  domain_rand:
    randomize_base_mass: true
    added_mass_range: [-0.5, 0.5]
    push_robots: true
    push_interval: 750
    max_force: [1.0, 1.0, 0.5]
    push_body_name: "pelvis"


reward:
  scales:
    tracking_lin_vel: 2.0
    tracking_ang_vel: 1.5
    move_progress: 1.5
    under_speed_consider_stand: -0.5
    feet_phase_consider_stand: 3.0
    lin_vel_z: -1.0
    ang_vel_xy: -0.25
    base_height: -40.0
    orientation: -5.0
    action_rate: -2
    pose: -0.1
    upper_body_pose: -0.5
    penalty_close_feet_xy: -0.5
    penalty_feet_ori_z: -0.5
  tracking_sigma: 0.25
  gait_frequency: 1.5
  feet_phase_swing_height: 0.09
  close_feet_threshold: 0.15
  feet_phase_tracking_sigma: 0.008
  base_height_target: 0.60
  min_base_height: 0.52
  max_tilt_deg: 25.0
  pose_weights: [0.01, 1.0, 5.0, 0.01, 5.0, 5.0, 0.01, 1.0, 5.0, 0.01, 5.0, 5.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
